<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Security whiteboard screenshot explaining one-time pad properties">
  <rect width="1280" height="720" fill="#064e3b"/>
  <rect x="70" y="54" width="1140" height="612" rx="14" fill="#ecfdf5"/>
  <text x="110" y="108" font-family="Segoe UI, Arial" font-size="30" fill="#065f46" font-weight="700">One-Time Pad Briefing</text>
  <line x1="110" y1="128" x2="1170" y2="128" stroke="#6ee7b7" stroke-width="3"/>
  <text x="120" y="190" font-family="Segoe UI, Arial" font-size="26" fill="#065f46">Required conditions for theoretical unbreakability:</text>
  <text x="150" y="244" font-family="Segoe UI, Arial" font-size="24" fill="#047857">1) Key is truly random</text>
  <text x="150" y="286" font-family="Segoe UI, Arial" font-size="24" fill="#047857">2) Key length equals message length</text>
  <text x="150" y="328" font-family="Segoe UI, Arial" font-size="24" fill="#047857">3) Key is used once only</text>
  <rect x="120" y="376" width="1040" height="210" rx="10" fill="#d1fae5" stroke="#34d399"/>
  <text x="150" y="444" font-family="Segoe UI, Arial" font-size="26" fill="#065f46">If key is reused, patterns leak and secrecy breaks.</text>
  <text x="150" y="492" font-family="Segoe UI, Arial" font-size="26" fill="#065f46" font-weight="700">Not easy to deploy, but mathematically ideal.</text>
</svg>
